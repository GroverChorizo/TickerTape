name: "TickerTape Integrity Gate"

on:
  pull_request:
    paths:
      - "**"
  push:
    branches:
      - main

jobs:
  gate:
    name: Data Integrity Gate (TickerTape)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install repo dependencies from repo root
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Data Integrity Gate
        run: |
          python tools/data_integrity_gate.py --ci --root .

      - name: Run tests
        run: |
          pytest -q
